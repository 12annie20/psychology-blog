<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章 — 晴空萬里・言言善也</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500&family=Noto+Sans+TC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1612; --ink-soft: #3e3830; --ink-faint: #8a817a;
  --paper: #f7f4ef; --warm: #c9a96e; --accent: #7a5c4a; --dim: #2a2420;
  --border: rgba(74,68,64,0.10);
}
html { font-size: 17px; scroll-behavior: smooth; }
body { background: var(--paper); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; font-weight: 300; line-height: 1.9; -webkit-font-smoothing: antialiased; }

nav { position: sticky; top: 0; z-index: 100; background: rgba(247,244,239,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
.nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 clamp(1.5rem,5vw,3rem); display: flex; align-items: center; justify-content: space-between; height: 60px; }
.nav-logo { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1.1rem; color: var(--ink); text-decoration: none; }
.nav-logo span { color: var(--warm); }
.nav-back { font-size: 0.75rem; letter-spacing: 0.12em; color: var(--ink-faint); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
.nav-back:hover { color: var(--accent); }

/* HERO */
.article-hero { background: var(--dim); position: relative; overflow: hidden; }
.article-hero-img { width: 100%; max-height: 520px; object-fit: cover; display: block; opacity: 0.75; }
.article-hero-placeholder { width: 100%; height: 360px; background: linear-gradient(135deg, #2a2420, #3e3430); display: flex; align-items: center; justify-content: center; color: rgba(201,169,110,0.2); font-size: 0.65rem; letter-spacing: 0.2em; }
.article-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,22,18,0.7) 0%, transparent 50%); }
.article-hero-meta { position: absolute; bottom: 0; left: 0; right: 0; padding: clamp(2rem,5vw,4rem) clamp(2rem,8vw,9rem); }
.article-cat { font-size: 0.65rem; letter-spacing: 0.25em; color: var(--warm); margin-bottom: 1rem; display: block; }
.article-title { font-family: 'Noto Serif TC', serif; font-weight: 200; font-size: clamp(1.8rem,4.5vw,3.2rem); line-height: 1.3; color: #f0ebe3; max-width: 22ch; }
.article-date { margin-top: 1.2rem; font-size: 0.72rem; color: rgba(240,235,227,0.4); letter-spacing: 0.1em; }

/* BODY */
.article-wrap { max-width: 1100px; margin: 0 auto; padding: 0 clamp(1.5rem,5vw,3rem); display: grid; grid-template-columns: 1fr 280px; gap: 5rem; margin-top: 4rem; margin-bottom: 5rem; }
@media (max-width: 860px) { .article-wrap { grid-template-columns: 1fr; gap: 3rem; } .article-sidebar { display: none; } }

.article-body { max-width: 680px; }
.article-content { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1.05rem; line-height: 2.1; color: var(--ink-soft); }
.article-content h2 { font-weight: 300; font-size: 1.2rem; color: var(--ink); margin: 3rem 0 1.2rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
.article-content h3 { font-weight: 300; font-size: 1.05rem; color: var(--accent); margin: 2.2rem 0 0.9rem; }
.article-content p { margin-bottom: 1.7rem; }
.article-content blockquote { margin: 2.5rem 0; padding: 1.8rem 0 1.8rem 2rem; border-left: 1.5px solid var(--warm); font-style: normal; color: var(--accent); font-size: 1.08rem; line-height: 2; white-space: pre-line; }
.article-content img { width: 100%; margin: 2rem 0; display: block; }
.article-content .concept-box { background: rgba(201,169,110,0.07); padding: 1.8rem 2rem; margin: 2.5rem 0; border-top: 1px solid rgba(201,169,110,0.25); }
.article-content .concept-box .label { font-family: 'Noto Sans TC'; font-size: 0.65rem; letter-spacing: 0.22em; color: var(--warm); display: block; margin-bottom: 0.7rem; }
.article-content .concept-box p { font-family: 'Noto Sans TC'; font-size: 0.88rem; color: var(--ink-faint); margin-bottom: 0; }

/* TAGS */
.article-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
.tag-item { font-size: 0.72rem; padding: 0.3rem 0.85rem; border: 1px solid var(--border); color: var(--ink-faint); letter-spacing: 0.05em; }

/* SIDEBAR STICKY */
.article-sidebar { position: relative; }
.sidebar-sticky { position: sticky; top: 80px; }
.toc { background: #fff; border: 1px solid var(--border); padding: 1.6rem; margin-bottom: 2rem; }
.toc-label { font-size: 0.65rem; letter-spacing: 0.22em; color: var(--warm); display: block; margin-bottom: 1rem; }
.toc ul { list-style: none; display: flex; flex-direction: column; gap: 0.1rem; }
.toc a { font-size: 0.8rem; color: var(--ink-faint); text-decoration: none; line-height: 1.8; padding: 0.15rem 0; display: block; border-left: 2px solid transparent; padding-left: 0.8rem; transition: all 0.2s; }
.toc a:hover, .toc a.active { color: var(--accent); border-left-color: var(--warm); }

/* RELATED */
.related { margin-top: 4rem; padding-top: 2.5rem; border-top: 1px solid var(--border); }
.related h3 { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1rem; margin-bottom: 2rem; }
.related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
@media (max-width: 560px) { .related-grid { grid-template-columns: 1fr; } }
.related-card { text-decoration: none; color: inherit; display: flex; flex-direction: column; border: 1px solid var(--border); background: #fff; transition: transform 0.2s; }
.related-card:hover { transform: translateY(-2px); }
.related-card-img { width: 100%; aspect-ratio: 16/9; background: var(--dim); overflow: hidden; }
.related-card-img img { width: 100%; height: 100%; object-fit: cover; }
.related-card-img-ph { width: 100%; height: 100%; background: linear-gradient(135deg, #2a2420, #3e3430); }
.related-card-body { padding: 1.1rem 1.2rem; }
.related-card-cat { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--warm); display: block; margin-bottom: 0.4rem; }
.related-card-title { font-family: 'Noto Serif TC', serif; font-size: 0.88rem; font-weight: 300; line-height: 1.6; color: var(--ink); }

/* LOADING */
.article-loading { max-width: 680px; margin: 5rem auto; padding: 0 2rem; }
.sk { background: linear-gradient(90deg, #ede9e3 25%, #e5e1db 50%, #ede9e3 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; height: 14px; border-radius: 2px; margin-bottom: 1rem; }
.sk.title { height: 42px; width: 75%; margin-bottom: 1.5rem; }
.sk.short { width: 35%; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

footer { background: var(--dim); padding: 2.5rem clamp(1.5rem,5vw,3rem); margin-top: 2rem; text-align: center; }
.footer-logo { font-family: 'Noto Serif TC', serif; font-weight: 200; font-size: 1rem; color: rgba(240,235,227,0.5); }
.footer-logo span { color: var(--warm); }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">晴空萬里<span>・</span>言言善也</a>
    <a href="index.html" class="nav-back">← 返回首頁</a>
  </div>
</nav>

<div id="articleHeroWrap"></div>

<div class="article-wrap" id="articleWrap">
  <div class="article-loading">
    <div class="sk short"></div>
    <div class="sk title"></div>
    <div class="sk"></div><div class="sk"></div><div class="sk short"></div>
    <br>
    <div class="sk"></div><div class="sk"></div><div class="sk short"></div>
  </div>
</div>

<footer>
  <div class="footer-logo">晴空萬里<span>・</span>言言善也</div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfVUjvhYXFzeEEnlZagxH48cY3Qh0IrvA",
  authDomain: "psychology-blog-6566c.firebaseapp.com",
  projectId: "psychology-blog-6566c",
  storageBucket: "psychology-blog-6566c.firebasestorage.app",
  messagingSenderId: "835080836966",
  appId: "1:835080836966:web:bb0048b5c1d568b09e1aa7"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const id = params.get('id');

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
}

function buildTOC(content) {
  const tmp = document.createElement('div');
  tmp.innerHTML = content;
  const heads = tmp.querySelectorAll('h2, h3');
  if (heads.length < 2) return '';
  let items = '';
  heads.forEach((h, i) => {
    h.id = `section-${i}`;
    items += `<li><a href="#section-${i}" style="${h.tagName==='H3'?'padding-left:1.6rem;font-size:0.74rem':''}">${h.textContent}</a></li>`;
  });
  return `<div class="toc"><span class="toc-label">文章目錄</span><ul>${items}</ul></div>`;
}

async function loadRelated(category, currentId) {
  try {
    const q = query(collection(db,'posts'), where('category','==',category), orderBy('createdAt','desc'), limit(5));
    const snap = await getDocs(q);
    return snap.docs.filter(d => d.id !== currentId).slice(0,2).map(d => ({id:d.id,...d.data()}));
  } catch { return []; }
}

async function render() {
  if (!id) { document.getElementById('articleWrap').innerHTML = '<div style="padding:5rem 2rem;text-align:center;color:var(--ink-faint)">找不到文章</div>'; return; }
  try {
    const snap = await getDoc(doc(db,'posts',id));
    if (!snap.exists()) { document.getElementById('articleWrap').innerHTML = '<div style="padding:5rem 2rem;text-align:center;color:var(--ink-faint)">文章不存在</div>'; return; }
    const post = {id: snap.id, ...snap.data()};
    document.title = `${post.title} — 晴空萬里・言言善也`;

    // Hero
    document.getElementById('articleHeroWrap').innerHTML = `
      <div class="article-hero">
        ${post.coverImage ? `<img class="article-hero-img" src="${post.coverImage}" alt="${post.title}">` : '<div class="article-hero-placeholder">無封面圖片</div>'}
        <div class="article-hero-overlay"></div>
        <div class="article-hero-meta">
          <span class="article-cat">${post.category || '文章'}</span>
          <h1 class="article-title">${post.title}</h1>
          <span class="article-date">${formatDate(post.createdAt)}</span>
        </div>
      </div>`;

    // TOC
    const toc = buildTOC(post.content || '');

    // Related
    const related = await loadRelated(post.category, post.id);
    const relatedHTML = related.length > 0 ? `
      <div class="related">
        <h3>相關文章</h3>
        <div class="related-grid">
          ${related.map(r => `
            <a class="related-card" href="article.html?id=${r.id}">
              <div class="related-card-img">${r.coverImage ? `<img src="${r.coverImage}" alt="">` : '<div class="related-card-img-ph"></div>'}</div>
              <div class="related-card-body">
                <span class="related-card-cat">${r.category||''}</span>
                <div class="related-card-title">${r.title}</div>
              </div>
            </a>`).join('')}
        </div>
      </div>` : '';

    const tagsHTML = post.tags ? `<div class="article-tags">${post.tags.split(',').map(t=>`<span class="tag-item">${t.trim()}</span>`).join('')}</div>` : '';

    document.getElementById('articleWrap').innerHTML = `
      <article class="article-body">
        <div class="article-content">${post.content || ''}</div>
        ${tagsHTML}
        ${relatedHTML}
      </article>
      <aside class="article-sidebar">
        <div class="sidebar-sticky">${toc}</div>
      </aside>`;

    // Activate TOC IDs (content was re-parsed, re-apply ids)
    document.querySelectorAll('.article-content h2, .article-content h3').forEach((h,i) => h.id = `section-${i}`);

    // TOC scroll spy
    const tocLinks = document.querySelectorAll('.toc a');
    if (tocLinks.length) {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            tocLinks.forEach(a => a.classList.remove('active'));
            const link = document.querySelector(`.toc a[href="#${e.target.id}"]`);
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px' });
      document.querySelectorAll('.article-content h2, .article-content h3').forEach(h => obs.observe(h));
    }
  } catch(e) {
    document.getElementById('articleWrap').innerHTML = '<div style="padding:5rem 2rem;text-align:center;color:var(--ink-faint)">載入失敗，請稍後再試。</div>';
  }
}
render();
</script>
</body>
</html>
