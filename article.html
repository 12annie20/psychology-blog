<script>
// ── YouTube IFrame API ──
var ytPlayer = null;
var ytReady = false;
var ytPendingVideoId = null;
var ytPendingStartSec = 0;

window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  ytPlayer = new YT.Player('ytIframe', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0 },
    events: {
      onReady: function(e) {
        e.target.setVolume(80);
        if (ytPendingVideoId) loadAndPlay(ytPendingVideoId, ytPendingStartSec);
      },
      onStateChange: function(e) {
        const playing = e.data === YT.PlayerState.PLAYING;
        document.getElementById('iconPlay').style.display = playing ? 'none' : '';
        document.getElementById('iconPause').style.display = playing ? '' : 'none';
        document.getElementById('nowPlayingDot').classList.toggle('active', playing);
        if (playing) startProgressLoop();
      }
    }
  });
};

var progressInterval = null;
function startProgressLoop() {
  clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (!ytPlayer || !ytPlayer.getDuration) return;
    const cur = ytPlayer.getCurrentTime() || 0;
    const dur = ytPlayer.getDuration() || 0;
    if (dur > 0) {
      document.getElementById('playerProgressFill').style.width = (cur/dur*100) + '%';
      document.getElementById('playerCurrentTime').textContent = formatTime(cur);
      document.getElementById('playerDuration').textContent = formatTime(dur);
    }
  }, 500);
}

function formatTime(s) {
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return m + ':' + (sec<10?'0':'')+sec;
}

function loadAndPlay(videoId, startSec) {
  if (!ytPlayer || !ytPlayer.loadVideoById) {
    ytPendingVideoId = videoId; ytPendingStartSec = startSec; return;
  }
  ytPlayer.loadVideoById({ videoId, startSeconds: startSec||0 });
  ytPlayer.setVolume(parseInt(document.getElementById('playerVolume').value));
  // fetch thumbnail
  document.getElementById('playerThumb').src = `https://img.youtube.com/vi/${videoId}/default.jpg`;
}

// Player controls
document.getElementById('playerPlayPause').addEventListener('click', () => {
  if (!ytPlayer) return;
  const state = ytPlayer.getPlayerState();
  if (state === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
  else ytPlayer.playVideo();
});

document.getElementById('playerMute').addEventListener('click', () => {
  if (!ytPlayer) return;
  if (ytPlayer.isMuted()) { ytPlayer.unMute(); ytPlayer.setVolume(parseInt(document.getElementById('playerVolume').value)); }
  else ytPlayer.mute();
});

document.getElementById('playerVolume').addEventListener('input', function() {
  if (ytPlayer) { ytPlayer.setVolume(parseInt(this.value)); ytPlayer.unMute(); }
});

// Progress bar click to seek
document.getElementById('playerProgress').addEventListener('click', function(e) {
  if (!ytPlayer || !ytPlayer.getDuration) return;
  const rect = this.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  ytPlayer.seekTo(ratio * ytPlayer.getDuration(), true);
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfVUjvhYXFzeEEnlZagxH48cY3Qh0IrvA",
  authDomain: "psychology-blog-6566c.firebaseapp.com",
  projectId: "psychology-blog-6566c",
  storageBucket: "psychology-blog-6566c.firebasestorage.app",
  messagingSenderId: "835080836966",
  appId: "1:835080836966:web:bb0048b5c1d568b09e1aa7"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const params = new URLSearchParams(location.search);
const id = params.get('id');

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });
}

function extractYouTubeId(url) {
  if (!url) return null;
  const patterns = [/youtu\.be\/([^?&]+)/, /youtube\.com\/watch\?v=([^&]+)/, /youtube\.com\/embed\/([^?&]+)/];
  for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
  return null;
}

function buildTOC(el) {
  const heads = el.querySelectorAll('h2, h3');
  if (heads.length < 2) return '';
  let items = '';
  heads.forEach((h,i) => {
    h.id = `section-${i}`;
    items += `<li><a href="#section-${i}" style="${h.tagName==='H3'?'padding-left:1.6rem;font-size:0.74rem':''}">${h.textContent}</a></li>`;
  });
  return `<div class="toc"><span class="toc-label">文章目錄</span><ul>${items}</ul></div>`;
}

async function loadRelated(category, currentId) {
  try {
    const q = query(collection(db,'posts'), where('category','==',category), orderBy('createdAt','desc'), limit(5));
    const snap = await getDocs(q);
    return snap.docs.filter(d=>d.id!==currentId).slice(0,2).map(d=>({id:d.id,...d.data()}));
  } catch { return []; }
}

// ── MUSIC TRIGGER SETUP ──
function setupMusicTriggers(contentEl, musicBlocks) {
  if (!musicBlocks || !musicBlocks.length) return;
  const player = document.getElementById('musicPlayer');
  let currentTrackIdx = -1;

  // Find paragraphs/headings matching trigger keywords
  const triggers = [];
  musicBlocks.forEach((block, bi) => {
    if (!block.trigger || !block.url) return;
    const ytId = extractYouTubeId(block.url);
    if (!ytId) return;
    // Search all text nodes
    contentEl.querySelectorAll('h1,h2,h3,h4,p,blockquote,li').forEach(el => {
      if (el.textContent.includes(block.trigger)) {
        triggers.push({ el, ytId, startSec: block.startSec||0, idx: bi, trigger: block.trigger });
      }
    });
  });

  if (!triggers.length) return;

  // Show player
  player.classList.add('visible');

  // Intersection observer
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const t = triggers.find(t => t.el === entry.target);
      if (!t || t.idx === currentTrackIdx) return;
      currentTrackIdx = t.idx;
      // fade out → change → fade in
      player.classList.add('fading');
      setTimeout(() => {
        document.getElementById('playerTitle').textContent = '🎵 ' + t.trigger;
        document.getElementById('playerSubtitle').textContent = '沉浸式閱讀';
        loadAndPlay(t.ytId, t.startSec);
        player.classList.remove('fading');
      }, 400);
    });
  }, { rootMargin: '-30% 0px -50% 0px', threshold: 0 });

  triggers.forEach(t => obs.observe(t.el));

  // Auto-play first track when user scrolls past hero
  const heroObs = new IntersectionObserver(entries => {
    if (!entries[0].isIntersecting && currentTrackIdx === -1 && triggers.length) {
      currentTrackIdx = triggers[0].idx;
      document.getElementById('playerTitle').textContent = '🎵 ' + triggers[0].trigger;
      loadAndPlay(triggers[0].ytId, triggers[0].startSec);
    }
  }, { threshold: 0 });
  heroObs.observe(document.getElementById('articleHeroWrap'));
}

async function render() {
  if (!id) { document.getElementById('articleWrap').innerHTML='<div style="padding:5rem 2rem;text-align:center;color:var(--ink-faint)">找不到文章</div>'; return; }
  try {
    const snap = await getDoc(doc(db,'posts',id));
    if (!snap.exists()) { document.getElementById('articleWrap').innerHTML='<div style="padding:5rem 2rem;text-align:center;color:var(--ink-faint)">文章不存在</div>'; return; }
    const post = { id: snap.id, ...snap.data() };
    if (post.status === 'draft') { document.getElementById('articleWrap').innerHTML='<div style="padding:5rem 2rem;text-align:center;color:var(--ink-faint)">這篇文章尚未發布。</div>'; return; }

    document.title = `${post.title} — 安小姐的札記`;

    // ── SEO: Dynamic OG + JSON-LD ──
    const pageUrl = `https://12annie20.github.io/psychology-blog/article.html?id=${post.id}`;
    const seoDesc = post.seoDescription || post.excerpt || '安小姐的札記——用白話說心理學的故事。';
    const ogImg = post.coverImage || 'https://12annie20.github.io/psychology-blog/og-cover.jpg';

    // Update meta tags
    const setMeta = (id, val) => { const el = document.getElementById(id); if (el) el.content = val; };
    setMeta('ogTitle', post.title + ' — 安小姐的札記');
    setMeta('ogDesc', seoDesc);
    setMeta('ogImage', ogImg);
    setMeta('ogUrl', pageUrl);
    setMeta('twTitle', post.title + ' — 安小姐的札記');
    setMeta('twDesc', seoDesc);
    setMeta('twImage', ogImg);
    const canonical = document.getElementById('canonicalLink');
    if (canonical) canonical.href = pageUrl;

    // Update <meta name="description">
    let descMeta = document.querySelector('meta[name="description"]');
    if (!descMeta) { descMeta = document.createElement('meta'); descMeta.name = 'description'; document.head.appendChild(descMeta); }
    descMeta.content = seoDesc;

    // JSON-LD structured data
    const jsonLd = {
      '@context': 'https://schema.org',
      '@type': 'Article',
      'headline': post.title,
      'description': seoDesc,
      'image': ogImg,
      'author': { '@type': 'Person', 'name': '安小姐' },
      'publisher': { '@type': 'Organization', 'name': '安小姐的札記', 'url': 'https://12annie20.github.io/psychology-blog/' },
      'url': pageUrl,
      'datePublished': post.createdAt ? (post.createdAt.toDate ? post.createdAt.toDate().toISOString() : new Date(post.createdAt).toISOString()) : '',
      'inLanguage': 'zh-TW'
    };
    let ldScript = document.getElementById('jsonLd');
    if (!ldScript) { ldScript = document.createElement('script'); ldScript.id = 'jsonLd'; ldScript.type = 'application/ld+json'; document.head.appendChild(ldScript); }
    ldScript.textContent = JSON.stringify(jsonLd);
    if (post.seoDescription||post.excerpt) { const m=document.createElement('meta');m.name='description';m.content=post.seoDescription||post.excerpt;document.head.appendChild(m); }

    // Hero
    document.getElementById('articleHeroWrap').innerHTML = `
      <div class="article-hero">
        ${post.coverImage?`<img class="article-hero-img" src="${post.coverImage}" alt="${post.title}">`:'<div class="article-hero-placeholder">無封面圖片</div>'}
        <div class="article-hero-overlay"></div>
        <div class="article-hero-meta">
          <span class="article-cat">${post.category||'文章'}</span>
          <h1 class="article-title">${post.title}</h1>
          <span class="article-date">${formatDate(post.createdAt)}${post.readTime?' ・ '+post.readTime+' 分鐘閱讀':''}</span>
        </div>
      </div>`;

    // YouTube OST embed (top player)
    const ytId = extractYouTubeId(post.youtubeUrl||'');
    const ytHTML = ytId ? `<div class="yt-player"><iframe src="https://www.youtube.com/embed/${ytId}?rel=0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>` : '';

    // Build content element
    const contentDiv = document.createElement('div');
    contentDiv.className = 'article-content';
    contentDiv.innerHTML = post.content || '';

    const toc = buildTOC(contentDiv);
    const related = await loadRelated(post.category, post.id);
    const relatedHTML = related.length ? `
      <div class="related"><h3>相關文章</h3><div class="related-grid">
        ${related.map(r=>`<a class="related-card" href="article.html?id=${r.id}">
          <div class="related-card-img">${r.coverImage?`<img src="${r.coverImage}" alt="">`:'<div class="related-card-img-ph"></div>'}</div>
          <div class="related-card-body"><span class="related-card-cat">${r.category||''}</span><div class="related-card-title">${r.title}</div></div>
        </a>`).join('')}
      </div></div>` : '';
    const tagsHTML = post.tags ? `<div class="article-tags">${post.tags.split(',').map(t=>`<span class="tag-item">${t.trim()}</span>`).join('')}</div>` : '';

    document.getElementById('articleWrap').innerHTML = `
      <article class="article-body">
        ${ytHTML}
        <div id="articleContentMount"></div>
        ${tagsHTML}
        ${relatedHTML}
      </article>
      <aside class="article-sidebar"><div class="sidebar-sticky">${toc}</div></aside>`;

    document.getElementById('articleContentMount').appendChild(contentDiv);

    // TOC scroll spy
    const tocLinks = document.querySelectorAll('.toc a');
    if (tocLinks.length) {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            tocLinks.forEach(a=>a.classList.remove('active'));
            const link = document.querySelector(`.toc a[href="#${e.target.id}"]`);
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin:'-20% 0px -70% 0px' });
      contentDiv.querySelectorAll('h2,h3').forEach(h=>obs.observe(h));
    }

    // Setup music triggers
    if (post.musicBlocks && post.musicBlocks.length) {
      setupMusicTriggers(contentDiv, post.musicBlocks);
    }

  } catch(e) {
    document.getElementById('articleWrap').innerHTML='<div style="padding:5rem 2rem;text-align:center;color:var(--ink-faint)">載入失敗，請稍後再試。</div>';
  }
}
render();
</script>
</body>
</html>
