<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 — 晴空萬里</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&family=Noto+Sans+TC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1612; --ink-soft: #3e3830; --ink-faint: #8a817a;
  --paper: #f7f4ef; --warm: #c9a96e; --accent: #7a5c4a; --dim: #2a2420;
  --border: rgba(74,68,64,0.12); --red: #c0392b; --green: #27ae60;
  --editor-bg: #ffffff;
}
html { font-size: 15px; }
body { background: #f0ede7; color: var(--ink); font-family: 'Noto Sans TC', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }

/* ── LOGIN ── */
#loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--dim); }
.login-box { background: var(--paper); padding: 3rem; width: 360px; }
.login-box h1 { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1.3rem; margin-bottom: 0.5rem; }
.login-box p { font-size: 0.78rem; color: var(--ink-faint); margin-bottom: 2rem; }
.field { margin-bottom: 1.2rem; }
.field label { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--ink-faint); display: block; margin-bottom: 0.5rem; }
.field input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); background: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 300; color: var(--ink); outline: none; transition: border-color 0.2s; }
.field input:focus { border-color: var(--warm); }
.btn-primary { width: 100%; padding: 0.85rem; background: var(--dim); color: #f0ebe3; font-family: inherit; font-size: 0.82rem; letter-spacing: 0.15em; border: none; cursor: pointer; transition: background 0.2s; }
.btn-primary:hover { background: var(--accent); }
.login-error { font-size: 0.75rem; color: var(--red); margin-top: 0.8rem; text-align: center; min-height: 1.2rem; }

/* ── SHELL ── */
#adminShell { display: none; min-height: 100vh; }
.admin-nav { background: var(--dim); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 300; }
.admin-nav-logo { font-family: 'Noto Serif TC', serif; font-weight: 200; font-size: 1rem; color: rgba(240,235,227,0.7); text-decoration: none; }
.admin-nav-logo span { color: var(--warm); }
.admin-nav-right { display: flex; gap: 0.5rem; align-items: center; }
.nav-tab { font-size: 0.72rem; letter-spacing: 0.1em; color: rgba(240,235,227,0.4); cursor: pointer; padding: 0.35rem 0.9rem; border: 1px solid transparent; transition: all 0.2s; background: none; font-family: inherit; white-space: nowrap; }
.nav-tab:hover, .nav-tab.active { color: var(--warm); border-color: rgba(201,169,110,0.3); }
.btn-logout { font-size: 0.7rem; color: rgba(240,235,227,0.3); background: none; border: none; cursor: pointer; font-family: inherit; margin-left: 0.5rem; }
.btn-logout:hover { color: rgba(240,235,227,0.7); }

.admin-body { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }
.panel { display: none; }
.panel.active { display: block; }

/* ── POST LIST ── */
.panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.panel-head h2 { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1.2rem; }
.panel-head-right { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
.filter-tabs { display: flex; }
.filter-tab { font-size: 0.7rem; padding: 0.35rem 0.9rem; border: 1px solid var(--border); background: #fff; color: var(--ink-faint); cursor: pointer; font-family: inherit; transition: all 0.2s; }
.filter-tab:not(:last-child) { border-right: none; }
.filter-tab.active { background: var(--dim); color: #f0ebe3; border-color: var(--dim); }
.btn-new { background: var(--dim); color: #f0ebe3; padding: 0.6rem 1.4rem; font-family: inherit; font-size: 0.75rem; letter-spacing: 0.12em; border: none; cursor: pointer; transition: background 0.2s; }
.btn-new:hover { background: var(--accent); }

.post-table { width: 100%; border-collapse: collapse; background: #fff; }
.post-table th { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--ink-faint); padding: 0.9rem 1.2rem; text-align: left; border-bottom: 1px solid var(--border); font-weight: 300; }
.post-table td { padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border); font-size: 0.82rem; color: var(--ink-soft); vertical-align: middle; }
.post-table tr:hover td { background: #faf8f4; }
.title-cell { font-family: 'Noto Serif TC', serif; font-size: 0.9rem; color: var(--ink); max-width: 280px; }
.pinned-badge { font-size: 0.58rem; background: var(--warm); color: var(--dim); padding: 0.1rem 0.4rem; margin-left: 0.4rem; }
.cat-badge { font-size: 0.62rem; letter-spacing: 0.1em; color: var(--warm); }
.status-badge { font-size: 0.62rem; padding: 0.2rem 0.6rem; }
.status-badge.published { background: rgba(39,174,96,0.12); color: var(--green); }
.status-badge.draft { background: rgba(138,129,122,0.12); color: var(--ink-faint); }
.tbl-actions { display: flex; gap: 0.4rem; }
.btn-edit, .btn-del { font-size: 0.68rem; padding: 0.28rem 0.75rem; border: 1px solid var(--border); background: none; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn-edit { color: var(--ink-faint); }
.btn-edit:hover { border-color: var(--warm); color: var(--accent); }
.btn-del { border-color: transparent; color: rgba(192,57,43,0.5); }
.btn-del:hover { border-color: var(--red); color: var(--red); }
.empty-table { text-align: center; padding: 4rem; color: var(--ink-faint); font-size: 0.85rem; }

/* ── EDITOR WRAP ── */
.editor-wrap { background: #fff; padding: 2rem 2.5rem; }
.editor-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 1rem; }
.editor-head h2 { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1.1rem; }
.editor-actions { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
.save-status { font-size: 0.72rem; color: var(--warm); min-width: 70px; text-align: right; }
.btn-cancel, .btn-draft, .btn-save, .btn-prev-toggle {
  font-family: inherit; cursor: pointer; font-size: 0.72rem; letter-spacing: 0.1em;
  padding: 0.5rem 1.1rem; border: 1px solid var(--border); background: none; color: var(--ink-faint); transition: all 0.2s;
}
.btn-cancel:hover, .btn-prev-toggle:hover { border-color: var(--warm); color: var(--accent); }
.btn-draft:hover { border-color: var(--ink-soft); color: var(--ink); }
.btn-save { background: var(--warm); border-color: var(--warm); color: var(--dim); }
.btn-save:hover { background: var(--accent); border-color: var(--accent); color: #f0ebe3; }

/* ── FORM ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
@media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 0.5rem; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 0.68rem; letter-spacing: 0.18em; color: var(--ink-faint); display: flex; align-items: center; gap: 0.5rem; }
.lbadge { font-size: 0.58rem; background: rgba(201,169,110,0.15); color: var(--warm); padding: 0.1rem 0.45rem; }
.form-group input, .form-group select, .form-group textarea {
  padding: 0.75rem 1rem; border: 1px solid var(--border); background: #faf8f4;
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.88rem; font-weight: 300; color: var(--ink);
  outline: none; transition: border-color 0.2s; resize: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--warm); background: #fff; }
.ftitle { font-family: 'Noto Serif TC', serif !important; font-size: 1.1rem !important; }
.fhint { font-size: 0.67rem; color: var(--ink-faint); margin-top: 0.35rem; line-height: 1.65; }
.toggle-row { display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.toggle-item { display: flex; align-items: center; gap: 0.7rem; }
.toggle-item > label { font-size: 0.75rem; color: var(--ink-soft); cursor: pointer; }
.toggle { position: relative; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #d0ccc6; cursor: pointer; border-radius: 20px; transition: background 0.2s; }
.toggle-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-slider { background: var(--warm); }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
.yt-preview iframe { width: 100%; height: 120px; border: none; display: block; margin-top: 0.5rem; }
.word-count { font-size: 0.68rem; color: var(--ink-faint); margin-top: 0.5rem; }
.word-count b { color: var(--accent); font-weight: 400; }

/* ── TIPTAP TOOLBAR ── */
.tt-toolbar {
  position: sticky; top: 56px; z-index: 100;
  background: #faf8f4; border: 1px solid var(--border); border-bottom: none;
  padding: 0.5rem 0.8rem; display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: center;
}
.tt-toolbar .sep { width: 1px; height: 18px; background: var(--border); margin: 0 0.2rem; }
.tt-btn {
  background: none; border: 1px solid transparent; cursor: pointer; font-family: inherit;
  font-size: 0.75rem; color: var(--ink-soft); padding: 0.3rem 0.55rem; border-radius: 2px;
  transition: all 0.15s; white-space: nowrap; line-height: 1;
}
.tt-btn:hover { background: rgba(201,169,110,0.12); color: var(--accent); border-color: rgba(201,169,110,0.3); }
.tt-btn.active { background: rgba(201,169,110,0.18); color: var(--accent); border-color: rgba(201,169,110,0.4); }
.tt-btn svg { width: 14px; height: 14px; vertical-align: middle; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.tt-select { font-family: inherit; font-size: 0.75rem; color: var(--ink-soft); background: none; border: 1px solid transparent; padding: 0.28rem 0.4rem; cursor: pointer; outline: none; border-radius: 2px; }
.tt-select:hover { border-color: rgba(201,169,110,0.3); background: rgba(201,169,110,0.08); }
.tt-color { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; padding: 0; background: none; overflow: hidden; }
.tt-color input[type=color] { width: 32px; height: 32px; border: none; outline: none; cursor: pointer; margin: -6px 0 0 -6px; background: none; }

/* ── TIPTAP EDITOR AREA ── */
.tt-editor-wrap { border: 1px solid var(--border); background: var(--editor-bg); position: relative; }
.tt-editor {
  min-height: 500px; padding: 2rem 2.5rem;
  font-family: 'Noto Serif TC', serif; font-size: 1rem; line-height: 2.1;
  color: var(--ink-soft); outline: none;
}
.tt-editor:focus { outline: none; }
.tt-editor p { margin-bottom: 0.6rem; }
.tt-editor h1 { font-weight: 300; font-size: 1.7rem; color: var(--ink); margin: 1.5rem 0 0.8rem; line-height: 1.4; }
.tt-editor h2 { font-weight: 300; font-size: 1.2rem; color: var(--ink); margin: 2rem 0 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
.tt-editor h3 { font-weight: 300; font-size: 1rem; color: var(--accent); margin: 1.5rem 0 0.6rem; }
.tt-editor blockquote { border-left: 2px solid var(--warm); padding: 0.6rem 0 0.6rem 1.5rem; color: var(--accent); margin: 1.5rem 0; font-size: 1.05rem; }
.tt-editor ul, .tt-editor ol { padding-left: 1.8rem; margin: 0.8rem 0; }
.tt-editor li { margin-bottom: 0.3rem; }
.tt-editor hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
.tt-editor a { color: var(--warm); text-decoration: underline; }
.tt-editor img { max-width: 100%; display: block; margin: 1rem auto; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
.tt-editor img.selected { border-color: var(--warm); }

/* Callout box */
.tt-editor .callout {
  display: flex; gap: 1rem; align-items: flex-start;
  background: rgba(201,169,110,0.08); border: 1px solid rgba(201,169,110,0.25);
  border-left: 3px solid var(--warm); padding: 1.2rem 1.5rem; margin: 1.5rem 0;
}
.tt-editor .callout-icon { font-size: 1.2rem; flex-shrink: 0; line-height: 1.8; }
.tt-editor .callout-content { flex: 1; }
.tt-editor .callout-title {
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.68rem;
  letter-spacing: 0.2em; color: var(--warm); display: block; margin-bottom: 0.4rem;
}
.tt-editor .callout-body {
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem; color: var(--ink-soft); line-height: 1.85;
  min-height: 1.2rem; outline: none;
}

/* Placeholder */
.tt-editor.is-empty::before {
  content: attr(data-placeholder);
  color: rgba(138,129,122,0.45); pointer-events: none;
  position: absolute; font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem;
}

/* Image resize handle */
.img-resize-wrap { display: inline-block; position: relative; max-width: 100%; }
.img-resize-wrap img { display: block; }
.img-resize-handle {
  display: none; position: absolute; right: -6px; bottom: -6px;
  width: 12px; height: 12px; background: var(--warm); cursor: nwse-resize; border-radius: 2px;
}
.img-resize-wrap.selected .img-resize-handle { display: block; }
.img-resize-wrap.selected img { outline: 2px solid var(--warm); }
.img-toolbar {
  display: none; position: absolute; top: -36px; left: 50%; transform: translateX(-50%);
  background: var(--dim); border-radius: 3px; padding: 0.2rem 0.4rem;
  gap: 0.2rem; white-space: nowrap; z-index: 50;
}
.img-resize-wrap.selected .img-toolbar { display: flex; }
.img-tb-btn {
  background: none; border: none; color: rgba(240,235,227,0.7); cursor: pointer;
  font-family: inherit; font-size: 0.68rem; padding: 0.2rem 0.4rem; border-radius: 2px;
}
.img-tb-btn:hover { background: rgba(255,255,255,0.1); color: #f0ebe3; }

/* / MENU */
.slash-menu {
  display: none; position: fixed; background: #fff; border: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(26,22,18,0.12); min-width: 220px; z-index: 500;
  max-height: 320px; overflow-y: auto;
}
.slash-menu.show { display: block; }
.slash-item {
  display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 1rem;
  cursor: pointer; transition: background 0.12s; border: none; width: 100%;
  background: none; font-family: inherit; text-align: left;
}
.slash-item:hover, .slash-item.active { background: rgba(201,169,110,0.1); }
.slash-icon { font-size: 1rem; width: 24px; text-align: center; flex-shrink: 0; }
.slash-label { font-size: 0.82rem; color: var(--ink); }
.slash-desc { font-size: 0.68rem; color: var(--ink-faint); display: block; }

/* PREVIEW */
.preview-wrap { display: none; margin-top: 2rem; padding: 2rem 2.5rem; background: var(--paper); border: 1px solid var(--border); }
.preview-wrap.show { display: block; }
.preview-label { font-size: 0.65rem; letter-spacing: 0.22em; color: var(--warm); margin-bottom: 1.5rem; }
.preview-content { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1rem; line-height: 2.1; color: var(--ink-soft); }
.preview-content h1 { font-weight: 200; font-size: 1.7rem; color: var(--ink); margin: 1.5rem 0 0.8rem; }
.preview-content h2 { font-weight: 300; font-size: 1.15rem; color: var(--ink); margin: 2.5rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
.preview-content h3 { font-weight: 300; font-size: 0.98rem; color: var(--accent); margin: 1.8rem 0 0.7rem; }
.preview-content p { margin-bottom: 1.2rem; }
.preview-content blockquote { margin: 2rem 0; padding: 1rem 0 1rem 1.8rem; border-left: 1.5px solid var(--warm); color: var(--accent); }
.preview-content img { max-width: 100%; margin: 1.5rem auto; display: block; }
.preview-content ul, .preview-content ol { padding-left: 1.8rem; margin: 0.8rem 0 1.2rem; }
.preview-content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
.preview-content .callout { display: flex; gap: 1rem; background: rgba(201,169,110,0.08); border: 1px solid rgba(201,169,110,0.25); border-left: 3px solid var(--warm); padding: 1.2rem 1.5rem; margin: 2rem 0; }
.preview-content .callout-icon { font-size: 1.1rem; flex-shrink: 0; }
.preview-content .callout-title { font-family: 'Noto Sans TC'; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--warm); display: block; margin-bottom: 0.4rem; }
.preview-content .callout-body { font-family: 'Noto Sans TC'; font-size: 0.9rem; color: var(--ink-faint); line-height: 1.9; }

/* IMAGE MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,18,0.55); z-index: 600; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--paper); padding: 2rem; width: 440px; max-width: 92vw; }
.modal-box h3 { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1rem; margin-bottom: 1.2rem; }
.modal-box input[type=url] { width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--border); background: #fff; font-family: inherit; font-size: 0.88rem; color: var(--ink); outline: none; margin-bottom: 0.5rem; }
.modal-box input[type=url]:focus { border-color: var(--warm); }
.modal-hint { font-size: 0.67rem; color: var(--ink-faint); margin-bottom: 1.2rem; line-height: 1.6; }
.modal-preview-img { max-width: 100%; max-height: 150px; object-fit: contain; display: none; margin-bottom: 1rem; border: 1px solid var(--border); }
.modal-size { display: flex; gap: 0.8rem; align-items: center; margin-bottom: 1.2rem; }
.modal-size label { font-size: 0.72rem; color: var(--ink-faint); white-space: nowrap; }
.modal-size input[type=range] { flex: 1; accent-color: var(--warm); }
.modal-size span { font-size: 0.72rem; color: var(--accent); min-width: 40px; }
.modal-align { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; align-items: center; }
.modal-align label { font-size: 0.72rem; color: var(--ink-faint); margin-right: 0.3rem; }
.modal-align-btn { background: none; border: 1px solid var(--border); padding: 0.3rem 0.7rem; font-family: inherit; font-size: 0.7rem; cursor: pointer; color: var(--ink-faint); }
.modal-align-btn.active, .modal-align-btn:hover { border-color: var(--warm); color: var(--accent); background: rgba(201,169,110,0.08); }
.modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
.modal-btn { font-family: inherit; font-size: 0.75rem; padding: 0.5rem 1.2rem; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--ink-faint); transition: all 0.2s; }
.modal-btn:hover { border-color: var(--warm); color: var(--accent); }
.modal-btn.primary { background: var(--warm); border-color: var(--warm); color: var(--dim); }
.modal-btn.primary:hover { background: var(--accent); border-color: var(--accent); color: #f0ebe3; }

/* SETTINGS */
.settings-section { background: #fff; padding: 2rem 2.5rem; margin-bottom: 1.5rem; }
.settings-section h3 { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 1rem; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border); }
.settings-actions { display: flex; justify-content: flex-end; margin-top: 1.5rem; }
.btn-settings-save { background: var(--warm); border: none; padding: 0.6rem 1.8rem; font-family: inherit; font-size: 0.75rem; letter-spacing: 0.12em; color: var(--dim); cursor: pointer; transition: background 0.2s; }
.btn-settings-save:hover { background: var(--accent); color: #f0ebe3; }
.avatar-preview { width: 72px; height: 72px; border-radius: 50%; overflow: hidden; background: var(--dim); display: flex; align-items: center; justify-content: center; color: rgba(201,169,110,0.3); font-size: 0.6rem; margin-bottom: 0.8rem; }
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>後台管理</h1>
    <p>晴空萬里・言言善也</p>
    <div class="field"><label>電子郵件</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
    <div class="field"><label>密碼</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
    <button class="btn-primary" id="loginBtn">登入</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div class="modal-overlay" id="imgModal">
  <div class="modal-box">
    <h3>插入圖片</h3>
    <input type="url" id="imgUrl" placeholder="https://i.postimg.cc/xxxxx/image.jpg">
    <div class="modal-hint">將圖片上傳至 postimages.org，複製 Direct link 貼入</div>
    <img class="modal-preview-img" id="imgModalPreview" alt="">
    <div class="modal-size">
      <label>寬度</label>
      <input type="range" id="imgWidthSlider" min="20" max="100" value="100">
      <span id="imgWidthVal">100%</span>
    </div>
    <div class="modal-align">
      <label>對齊</label>
      <button class="modal-align-btn active" data-align="left">靠左</button>
      <button class="modal-align-btn" data-align="center">置中</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const firebaseConfig = {

  authDomain: "psychology-blog-6566c.firebaseapp.com",

const editor = document.getElementById('ttEditor');

// ── PLACEHOLDER ──
function checkPlaceholder() {
  if (editor.innerHTML.trim() === '' || editor.innerHTML === '<br>') {
    editor.classList.add('is-empty');
  } else {
    editor.classList.remove('is-empty');
  }
}
editor.addEventListener('input', () => { checkPlaceholder(); updateWordCount(); });
checkPlaceholder();

// ── WORD COUNT ──
function updateWordCount() {
  const text = editor.innerText || '';
  const chars = text.replace(/\s/g, '').length;
  const mins = Math.max(1, Math.round(chars / 400));
  document.getElementById('wcChars').textContent = chars.toLocaleString();
  document.getElementById('wcMin').textContent = mins;
}

// ── TOOLBAR COMMANDS ──
document.querySelectorAll('.tt-btn[data-cmd]').forEach(btn => {
  btn.addEventListener('click', () => {
    editor.focus();
    document.execCommand(btn.dataset.cmd, false, null);
    updateToolbarState();
  });
});

// Heading
document.getElementById('ttHeading').addEventListener('change', function() {
  editor.focus();
  const val = this.value;
  if (val === '0') document.execCommand('formatBlock', false, 'p');
  else document.execCommand('formatBlock', false, 'h' + val);
  updateToolbarState();
});

// Color
document.getElementById('ttColor').addEventListener('input', function() {
  editor.focus();
  document.execCommand('foreColor', false, this.value);
});

// Quote
document.getElementById('ttQuote').addEventListener('click', () => {
  editor.focus();
  document.execCommand('formatBlock', false, 'blockquote');
});

// Callout
document.getElementById('ttCallout').addEventListener('click', () => {
  insertHTML(`<div class="callout"><span class="callout-icon">💡</span><div class="callout-content"><span class="callout-title" contenteditable="true">心理學概念｜概念名稱</span><div class="callout-body" contenteditable="true">在這裡輸入說明…</div></div></div><p><br></p>`);
});

// HR
document.getElementById('ttHr').addEventListener('click', () => {
  insertHTML('<hr><p><br></p>');
});

// Link
document.getElementById('ttLink').addEventListener('click', () => {
  const url = prompt('輸入連結網址：');
  if (url) {
    editor.focus();
    document.execCommand('createLink', false, url);
  }
});

function insertHTML(html) {
  editor.focus();
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const el = document.createElement('div');
    el.innerHTML = html;
    const frag = document.createDocumentFragment();
    let node, lastNode;
    while ((node = el.firstChild)) { lastNode = frag.appendChild(node); }
    range.insertNode(frag);
    if (lastNode) {
      const r = range.cloneRange();
      r.setStartAfter(lastNode);
      r.collapse(true);
      sel.removeAllRanges();
      sel.addRange(r);
    }
  } else {
    editor.insertAdjacentHTML('beforeend', html);
  }
  editor.classList.remove('is-empty');
  updateWordCount();
}

// ── TOOLBAR STATE ──
function updateToolbarState() {
  const cmds = ['bold','italic','underline','strikeThrough','justifyLeft','justifyCenter','justifyRight','insertUnorderedList','insertOrderedList'];
  cmds.forEach(cmd => {
    const btn = document.querySelector(`.tt-btn[data-cmd="${cmd}"]`);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
  const block = document.queryCommandValue('formatBlock').toLowerCase();
  const sel = document.getElementById('ttHeading');
  if (block === 'h1') sel.value = '1';
  else if (block === 'h2') sel.value = '2';
  else if (block === 'h3') sel.value = '3';
  else sel.value = '0';
}
editor.addEventListener('keyup', updateToolbarState);
editor.addEventListener('mouseup', updateToolbarState);

// ── / SLASH MENU ──
const SLASH_ITEMS = [
  { icon: '📝', label: '一般段落', desc: '普通文字段落', action: () => { document.execCommand('formatBlock', false, 'p'); } },
  { icon: 'H1', label: 'H1 大標題', desc: '最大的標題', action: () => { document.execCommand('formatBlock', false, 'h1'); } },
  { icon: 'H2', label: 'H2 章節標題', desc: '章節分隔標題', action: () => { document.execCommand('formatBlock', false, 'h2'); } },
  { icon: 'H3', label: 'H3 小標題', desc: '段落內小標', action: () => { document.execCommand('formatBlock', false, 'h3'); } },
  { icon: '❝', label: '引言框', desc: '台詞或引言', action: () => { document.execCommand('formatBlock', false, 'blockquote'); } },
  { icon: '💡', label: '標註框', desc: '心理學概念框', action: () => document.getElementById('ttCallout').click() },
  { icon: '🖼', label: '插入圖片', desc: '從 postimages 插入', action: () => openImgModal() },
  { icon: '•', label: '無序清單', desc: '項目符號清單', action: () => { document.execCommand('insertUnorderedList'); } },
  { icon: '1.', label: '有序清單', desc: '數字編號清單', action: () => { document.execCommand('insertOrderedList'); } },
  { icon: '—', label: '分隔線', desc: '水平分隔線', action: () => document.getElementById('ttHr').click() },
];

let slashQuery = '';
let slashActive = -1;
let slashRange = null;

const slashMenu = document.getElementById('slashMenu');

function renderSlashMenu(items) {
  slashMenu.innerHTML = items.map((item, i) => `
    <button class="slash-item${i === slashActive ? ' active' : ''}" data-idx="${i}">
      <span class="slash-icon">${item.icon}</span>
      <span><span class="slash-label">${item.label}</span><span class="slash-desc">${item.desc}</span></span>
    </button>`).join('');
  slashMenu.querySelectorAll('.slash-item').forEach((btn, i) => {
    btn.addEventListener('mousedown', e => { e.preventDefault(); executeSlash(items[i]); });
  });
}

function openSlashMenu() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  slashRange = sel.getRangeAt(0).cloneRange();
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  slashMenu.style.top = (rect.bottom + window.scrollY + 6) + 'px';
  slashMenu.style.left = Math.min(rect.left, window.innerWidth - 240) + 'px';
  slashActive = -1;
  slashQuery = '';
  renderSlashMenu(SLASH_ITEMS);
  slashMenu.classList.add('show');
}

function closeSlashMenu() { slashMenu.classList.remove('show'); slashQuery = ''; slashActive = -1; }

function executeSlash(item) {
  // Delete the / and query
  if (slashRange) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(slashRange);
  }
  // Delete typed /query
  const toDelete = '/' + slashQuery;
  for (let i = 0; i < toDelete.length; i++) document.execCommand('delete');
  closeSlashMenu();
  item.action();
  editor.focus();
}

editor.addEventListener('keydown', e => {
  if (slashMenu.classList.contains('show')) {
    const filtered = SLASH_ITEMS.filter(it => it.label.includes(slashQuery) || it.desc.includes(slashQuery));
    if (e.key === 'ArrowDown') { e.preventDefault(); slashActive = Math.min(slashActive + 1, filtered.length - 1); renderSlashMenu(filtered); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); slashActive = Math.max(slashActive - 1, 0); renderSlashMenu(filtered); return; }
    if (e.key === 'Enter' && slashActive >= 0) { e.preventDefault(); executeSlash(filtered[slashActive]); return; }
    if (e.key === 'Escape') { closeSlashMenu(); return; }
  }
  if (e.key === 'Tab') { e.preventDefault(); document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;'); }
});

editor.addEventListener('keyup', e => {
  if (slashMenu.classList.contains('show')) {
    if (e.key === 'Backspace') {
      if (slashQuery.length > 0) slashQuery = slashQuery.slice(0, -1);
      else { closeSlashMenu(); return; }
    } else if (e.key.length === 1 && e.key !== '/') {
      slashQuery += e.key;
    }
    const filtered = SLASH_ITEMS.filter(it => !slashQuery || it.label.toLowerCase().includes(slashQuery.toLowerCase()) || it.desc.toLowerCase().includes(slashQuery.toLowerCase()));
    if (!filtered.length) { closeSlashMenu(); return; }
    slashActive = Math.min(slashActive, filtered.length - 1);
    renderSlashMenu(filtered);
    return;
  }
  if (e.key === '/') openSlashMenu();
});

document.addEventListener('click', e => {
  if (!slashMenu.contains(e.target) && e.target !== editor) closeSlashMenu();
});

// ── IMAGE INSERT ──
function openImgModal() {
  document.getElementById('imgUrl').value = '';
  document.getElementById('imgWidthSlider').value = 100;
  document.getElementById('imgWidthVal').textContent = '100%';
  document.getElementById('imgModalPreview').style.display = 'none';
  imgAlign = 'center';

  document.getElementById('imgModal').classList.add('show');
}

document.getElementById('ttImg').addEventListener('click', openImgModal);

document.getElementById('imgUrl').addEventListener('input', function() {
  const prev = document.getElementById('imgModalPreview');
  if (this.value.trim()) { prev.src = this.value.trim(); prev.style.display = 'block'; }
  else prev.style.display = 'none';
});
document.getElementById('imgWidthSlider').addEventListener('input', function() {
  document.getElementById('imgWidthVal').textContent = this.value + '%';
});
document.querySelectorAll('.modal-align-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    imgAlign = btn.dataset.align;
    document.querySelectorAll('.modal-align-btn').forEach(b => b.classList.toggle('active', b.dataset.align === imgAlign));
  });
});
document.getElementById('imgModalCancel').addEventListener('click', () => document.getElementById('imgModal').classList.remove('show'));

document.getElementById('imgModalInsert').addEventListener('click', () => {
  const url = document.getElementById('imgUrl').value.trim();
  const width = document.getElementById('imgWidthSlider').value;
  if (!url) return;
  const marginStyle = imgAlign === 'center' ? 'margin:1rem auto;' : imgAlign === 'right' ? 'margin:1rem 0 1rem auto;' : 'margin:1rem auto 1rem 0;';
  const html = `<div class="img-resize-wrap" style="width:${width}%;${marginStyle}display:block;"><img src="${url}" style="width:100%;height:auto;display:block;" alt=""><div class="img-resize-handle"></div><div class="img-toolbar"><button class="img-tb-btn" data-action="smaller">縮小</button><button class="img-tb-btn" data-action="larger">放大</button><button class="img-tb-btn" data-action="full">100%</button><button class="img-tb-btn" data-action="delete">刪除</button></div></div><p><br></p>`;
  editor.focus();
  insertHTML(html);
  bindImgControls();
  document.getElementById('imgModal').classList.remove('show');
});

// ── IMAGE RESIZE & SELECT ──
function bindImgControls() {
  editor.querySelectorAll('.img-resize-wrap').forEach(wrap => {
    if (wrap._bound) return;
    wrap._bound = true;
    const img = wrap.querySelector('img');
    const handle = wrap.querySelector('.img-resize-handle');

    wrap.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.img-resize-wrap').forEach(w => w.classList.remove('selected'));
      wrap.classList.add('selected');
      selectedImg = wrap;
    });

    // Drag handle to resize
    let startX, startW;
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      startX = e.clientX;
      startW = wrap.offsetWidth;
      const onMove = ev => {
        const dx = ev.clientX - startX;
        const parentW = wrap.parentElement.offsetWidth || 680;
        const newW = Math.min(100, Math.max(20, Math.round(((startW + dx) / parentW) * 100)));
        wrap.style.width = newW + '%';
      };
      const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Toolbar buttons
    wrap.querySelectorAll('.img-tb-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const action = btn.dataset.action;
        const current = parseInt(wrap.style.width) || 100;
        if (action === 'smaller') wrap.style.width = Math.max(20, current - 10) + '%';
        else if (action === 'larger') wrap.style.width = Math.min(100, current + 10) + '%';
        else if (action === 'full') wrap.style.width = '100%';
        else if (action === 'delete') { wrap.remove(); selectedImg = null; }
      });
    });
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.img-resize-wrap')) {
    document.querySelectorAll('.img-resize-wrap').forEach(w => w.classList.remove('selected'));
    selectedImg = null;
  }
});

editor.addEventListener('input', bindImgControls);

// ── YOUTUBE PREVIEW ──
function extractYouTubeId(url) {
  if (!url) return null;
  const patterns = [/youtu\.be\/([^?&]+)/, /youtube\.com\/watch\?v=([^&]+)/, /youtube\.com\/embed\/([^?&]+)/];
  for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
  return null;
}
document.getElementById('fYoutube').addEventListener('input', function() {
  const ytId = extractYouTubeId(this.value.trim());
  document.getElementById('ytPreview').innerHTML = ytId ? `<iframe src="https://www.youtube.com/embed/${ytId}?rel=0" allowfullscreen></iframe>` : '';
});

// ── AUTH ──
onAuthStateChanged(auth, user => {
  if (user) { document.getElementById('loginScreen').style.display='none'; document.getElementById('adminShell').style.display='block'; loadPosts(); loadSettings(); }
  else { document.getElementById('loginScreen').style.display='flex'; document.getElementById('adminShell').style.display='none'; }
});
document.getElementById('loginBtn').addEventListener('click', async () => {
  const err = document.getElementById('loginError');
  err.textContent = '';
  try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); }
  catch(e) { err.textContent = '帳號或密碼錯誤'; }
});
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('loginBtn').click(); });
document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

// ── POST LIST ──
function formatDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
}

async function loadPosts() {
  try {
    const snap = await getDocs(query(collection(db,'posts'), orderBy('createdAt','desc')));
    allPostsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTable(allPostsCache);
  } catch(e) { document.getElementById('postTableBody').innerHTML='<tr><td colspan="5" class="empty-table">載入失敗</td></tr>'; }
}

function renderTable(posts) {
  const tbody = document.getElementById('postTableBody');
  const filtered = currentFilter==='all' ? posts : posts.filter(p => currentFilter==='draft' ? p.status==='draft' : p.status!=='draft');
  if (!filtered.length) { tbody.innerHTML=`<tr><td colspan="5" class="empty-table">${currentFilter==='draft'?'沒有草稿':'還沒有文章'}</td></tr>`; return; }
  tbody.innerHTML = filtered.map(p=>`<tr>
    <td class="title-cell">${p.pinned?'<span class="pinned-badge">置頂</span> ':''}${p.title||'（無標題）'}</td>
    <td><span class="cat-badge">${p.category||'—'}</span></td>
    <td><span class="status-badge ${p.status==='draft'?'draft':'published'}">${p.status==='draft'?'草稿':'已發布'}</span></td>
    <td>${formatDate(p.createdAt)}</td>
    <td><div class="tbl-actions">
      <button class="btn-edit" onclick="editPost('${p.id}')">編輯</button>
      <button class="btn-del" onclick="deletePost('${p.id}','${(p.title||'').replace(/'/g,"\\'")}')">刪除</button>
    </div></td>
  </tr>`).join('');
}

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable(allPostsCache);
  });
});

// ── EDIT ──
window.editPost = async function(id) {
  editingId = id;
  const snap = await getDoc(doc(db,'posts',id));
  if (!snap.exists()) return;
  const p = snap.data();
  document.getElementById('fTitle').value = p.title||'';
  document.getElementById('fCategory').value = p.category||'';
  document.getElementById('fTags').value = p.tags||'';
  document.getElementById('fCover').value = p.coverImage||'';
  document.getElementById('fYoutube').value = p.youtubeUrl||'';
  document.getElementById('fSeo').value = p.seoDescription||'';
  document.getElementById('fExcerpt').value = p.excerpt||'';
  document.getElementById('fPinned').checked = p.pinned||false;
  const ytId = extractYouTubeId(p.youtubeUrl||'');
  document.getElementById('ytPreview').innerHTML = ytId ? `<iframe src="https://www.youtube.com/embed/${ytId}?rel=0" allowfullscreen></iframe>` : '';
  editor.innerHTML = p.content || '';
  editor.classList.remove('is-empty');
  bindImgControls();
  updateWordCount();
  document.getElementById('editorTitle').textContent = '編輯文章';
  showPanel('editor', id);
};

window.deletePost = async function(id, title) {
  if (!confirm(`確定要刪除「${title}」？`)) return;
  await deleteDoc(doc(db,'posts',id));
  loadPosts();
};

// ── SAVE ──
async function savePost(status) {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { alert('請輸入文章標題'); return; }
  const statusEl = document.getElementById('saveStatus');
  statusEl.textContent = '儲存中…';
  const content = editor.innerHTML;
  const chars = (editor.innerText||'').replace(/\s/g,'').length;
  const data = {
    title, category: document.getElementById('fCategory').value,
    tags: document.getElementById('fTags').value,
    coverImage: document.getElementById('fCover').value.trim(),
    youtubeUrl: document.getElementById('fYoutube').value.trim(),
    seoDescription: document.getElementById('fSeo').value.trim(),
    excerpt: document.getElementById('fExcerpt').value.trim(),
    content, pinned: document.getElementById('fPinned').checked,
    readTime: Math.max(1, Math.round(chars/400)), status,
  };
  try {
    if (editingId) { await updateDoc(doc(db,'posts',editingId), data); }
    else { data.createdAt = serverTimestamp(); await addDoc(collection(db,'posts'), data); }
    statusEl.textContent = status==='draft' ? '草稿已儲存 ✓' : '已發布 ✓';
    setTimeout(() => { statusEl.textContent=''; showPanel('posts'); loadPosts(); }, 1200);
  } catch(e) { statusEl.textContent='儲存失敗'; alert('儲存失敗：'+e.message); }
}

document.getElementById('saveBtn').addEventListener('click', () => savePost('published'));
document.getElementById('saveDraftBtn').addEventListener('click', () => savePost('draft'));

document.getElementById('togglePreview').addEventListener('click', () => {
  const wrap = document.getElementById('previewWrap');
  if (wrap.classList.toggle('show')) {
    document.getElementById('previewContent').innerHTML = editor.innerHTML;
    wrap.scrollIntoView({ behavior:'smooth', block:'start' });
  }
});

// ── SETTINGS ──
async function loadSettings() {
  try {
    const [s, a] = await Promise.all([getDoc(doc(db,'settings','site')), getDoc(doc(db,'settings','author'))]);
    if (s.exists()) { const d=s.data(); document.getElementById('sSiteName').value=d.name||''; document.getElementById('sSiteTagline').value=d.tagline||''; document.getElementById('sSiteHero').value=d.hero||''; }
    if (a.exists()) { const d=a.data(); document.getElementById('sAuthorName').value=d.name||''; document.getElementById('sAuthorAvatar').value=d.avatar||''; document.getElementById('sAuthorOneliner').value=d.oneliner||''; document.getElementById('sAuthorBio').value=d.bio||''; if (d.avatar) document.getElementById('avatarPreview').innerHTML=`<img src="${d.avatar}" alt="">`; }
  } catch(e) {}
}
document.getElementById('sAuthorAvatar').addEventListener('input', function() {
  document.getElementById('avatarPreview').innerHTML = this.value.trim() ? `<img src="${this.value.trim()}" alt="">` : '頭像';
});
document.getElementById('saveSiteBtn').addEventListener('click', async () => {
  try { await setDoc(doc(db,'settings','site'), { name: document.getElementById('sSiteName').value.trim(), tagline: document.getElementById('sSiteTagline').value.trim(), hero: document.getElementById('sSiteHero').value.trim() }); document.getElementById('saveSiteBtn').textContent='已儲存 ✓'; setTimeout(()=>document.getElementById('saveSiteBtn').textContent='儲存網站資訊',1500); } catch(e) { alert(e.message); }
});
document.getElementById('saveAuthorBtn').addEventListener('click', async () => {
  try { await setDoc(doc(db,'settings','author'), { name: document.getElementById('sAuthorName').value.trim(), avatar: document.getElementById('sAuthorAvatar').value.trim(), oneliner: document.getElementById('sAuthorOneliner').value.trim(), bio: document.getElementById('sAuthorBio').value.trim() }); document.getElementById('saveAuthorBtn').textContent='已儲存 ✓'; setTimeout(()=>document.getElementById('saveAuthorBtn').textContent='儲存作者資訊',1500); } catch(e) { alert(e.message); }
});

// ── PANEL SWITCH ──
window.showPanel = function(name, id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if (name==='posts') { document.getElementById('panelPosts').classList.add('active'); document.getElementById('tabPosts').classList.add('active'); }
  else if (name==='settings') { document.getElementById('panelSettings').classList.add('active'); document.getElementById('tabSettings').classList.add('active'); }
  else {
    editingId = id||null;
    document.getElementById('panelEditor').classList.add('active');
    document.getElementById('tabNew').classList.add('active');
    if (!id) {
      ['fTitle','fCategory','fTags','fCover','fYoutube','fSeo','fExcerpt'].forEach(i=>{const el=document.getElementById(i);el.value='';});
      document.getElementById('fPinned').checked=false;
      document.getElementById('ytPreview').innerHTML='';
      editor.innerHTML='';
      editor.classList.add('is-empty');
      document.getElementById('wcChars').textContent='0';
      document.getElementById('wcMin').textContent='0';
      document.getElementById('editorTitle').textContent='新增文章';
      document.getElementById('previewWrap').classList.remove('show');
    }
  }
};
</script>
